# Stage-2 config (NPZ -> train-ready datasets)
#
# This file is intentionally separate from raw H5/XMF/VTK conversion.
# Workflow:
#   1) On preprocessing PC:  python -m final.h5_vtk_to_npz --config final/configs/h5_vtk_to_npz_template.yaml
#   2) Then here:            python -m final.dataset_builder --config final/configs/pipeline_config.yaml --build-field --build-particle
#   3) Copy final/output/unified_vpm_geometry_v2 (or selected preset folders) to GPU PC for training.

dataset_name: unified_vpm_geometry_v2
output_root: final/output

# Global defaults (used only if case metadata is not provided)
default_dt: 0.0
default_freestream: null
include_coordinates: false
auto_phase_from_index: true

# General case list. Use any IDs you want (1,2,7,8,...).
# No stationary/flapping classification is required.
# `npz_glob` should point to NPZ frames generated by h5_vtk_to_npz.py.
cases:
  - name: "1"
    npz_glob: ["final/output/merged_npz/1/*.npz"]
    vtk_glob: []

  - name: "2"
    npz_glob: ["final/output/merged_npz/2/*.npz"]
    vtk_glob: []

  - name: "7"
    npz_glob: ["final/output/merged_npz/7/*.npz"]
    vtk_glob: []

  - name: "8"
    npz_glob: ["final/output/merged_npz/8/*.npz"]
    vtk_glob: []

# Optional per-case metadata keys (add only if known):
#   time_step: 0.0
#   angle_of_attack: 0.0
#   Reynolds_number: 0.0
#   reduced_frequency: 0.0
#   freestream: [1.0, 0.0, 0.0]
#   phase: 0.0

split:
  train: 0.70
  val: 0.15
  test: 0.15
  strategy: random
  seed: 42

grid:
  # global bounds over all particles (+ optional vtk points)
  bounds_mode: global
  bounds: null
  padding_frac: 0.05
  include_vtk_bounds: true
  resolution: [32, 32, 32]

# Dataset variants to auto-generate
# A: scalar gamma baseline
# B: Gamma vector + sigma + density
# C: B + body_mask + SDF
# D: C + coordinates X,Y,Z
# E: D + phase + AoA + surface velocity
# F: all available channels
dataset_presets: ["A", "B", "C", "D", "E", "F"]

# Used only if dataset_presets includes CUSTOM
custom_input_channels:
  - Gamma_x
  - Gamma_y
  - Gamma_z
  - sigma
  - density
  - body_mask
  - signed_distance_field

# U / W / UW target choice
output_mode: UW

projection:
  kernel: gaussian         # gaussian | compact
  radius: 0.05
  support_multiplier: 3.0
  radius_from_sigma: true
  sigma_scale: 1.0
  normalize_weights: true
  min_weight: 1.0e-12

geometry:
  body_mask_thickness: 0.02
  use_signed_sdf: true
  include_coordinates: false

interpolation:
  method_priority: ["direct", "trilinear", "griddata", "rbf"]

normalization:
  enabled: true
  write_normalized_samples: true

# Particle-surrogate (GNO) dataset settings
build_particle_dataset: true
particle_input_features:
  - x
  - y
  - z
  - Gamma_x
  - Gamma_y
  - Gamma_z
  - sigma
  - vol
  - circulation
  - static
  - angle_of_attack
  - phase
  - freestream_x
  - freestream_y
  - freestream_z
