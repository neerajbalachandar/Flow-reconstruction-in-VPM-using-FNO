# Template config to merge split INPUT/OUTPUT H5 streams (+ optional XMF/VTK)
# into unified NPZ frames for multiple datasets.
#
# Run:
#   python -m final.h5_vtk_to_npz --config final/configs/h5_vtk_to_npz_template.yaml

output_dir: final/output/merged_npz

# How to extract numeric frame id from filenames (trailing integer by default)
frame_id_regex: "(\\d+)(?!.*\\d)"

# Pairing between input and output frames:
# - intersection: require same frame id in both
# - nearest_prev: for each input frame, choose latest output frame <= input
pair_mode: intersection

# Optional global defaults (can be overridden per dataset)
input_key_map: {}
output_key_map: {}

# Multiple datasets supported.
# Keep paths blank now; fill later.
datasets:
  - name: dataset_1
    output_subdir: dataset_1

    # Required (separate input/output streams)
    input_h5_glob: []
    output_h5_glob: []

    # Optional sidecar metadata paths
    input_xmf_glob: []
    output_xmf_glob: []
    vtk_glob: []

    # Optional per-dataset override
    pair_mode: intersection

    # NPZ key name -> H5 internal dataset path
    # Put only INPUT-stream datasets here
    input_key_map: {}

    # Put only OUTPUT-stream datasets here
    output_key_map: {}

  - name: dataset_2
    output_subdir: dataset_2
    input_h5_glob: []
    output_h5_glob: []
    input_xmf_glob: []
    output_xmf_glob: []
    vtk_glob: []
    pair_mode: intersection
    input_key_map: {}
    output_key_map: {}

# Example key maps:
# input_key_map:
#   particle_xyz: "/X"
#   Gamma_vec: "/Gamma"
#   sigma: "/sigma"
#   vol: "/vol"
#   circulation: "/circulation"
#   static: "/static"
# output_key_map:
#   nodes: "/nodes"
#   U: "/U"
#   W: "/W"
