# Template config to merge split INPUT/OUTPUT H5 streams (+ optional XMF/VTK)
# into unified NPZ frames for multiple datasets.
#
# Run:
#   python -m final.h5_vtk_to_npz --config final/configs/h5_vtk_to_npz_template.yaml

output_dir: final/output/merged_npz

# How to extract numeric frame id from filenames (trailing integer by default)
frame_id_regex: "(\\d+)(?!.*\\d)"

# Pairing between input and output frames:
# - intersection: require same frame id in both
# - nearest_prev: for each input frame, choose latest output frame <= input
pair_mode: intersection

# Optional global defaults (can be overridden per dataset)
input_key_map: {}
output_key_map: {}

# Multiple datasets supported. Use numeric names if preferred.
# Set output_subdir to 1/2/7/8 etc so pipeline_config npz_glob can point there.
datasets:
  - name: "1"
    output_subdir: "1"

    # Required (separate input/output streams)
    input_h5_glob: []
    output_h5_glob: []

    # Optional sidecar metadata paths
    input_xmf_glob: []
    output_xmf_glob: []
    vtk_glob: []

    pair_mode: intersection
    input_key_map: {}
    output_key_map: {}

  - name: "2"
    output_subdir: "2"
    input_h5_glob: []
    output_h5_glob: []
    input_xmf_glob: []
    output_xmf_glob: []
    vtk_glob: []
    pair_mode: intersection
    input_key_map: {}
    output_key_map: {}

  - name: "7"
    output_subdir: "7"
    input_h5_glob: []
    output_h5_glob: []
    input_xmf_glob: []
    output_xmf_glob: []
    vtk_glob: []
    pair_mode: intersection
    input_key_map: {}
    output_key_map: {}

  - name: "8"
    output_subdir: "8"
    input_h5_glob: []
    output_h5_glob: []
    input_xmf_glob: []
    output_xmf_glob: []
    vtk_glob: []
    pair_mode: intersection
    input_key_map: {}
    output_key_map: {}

