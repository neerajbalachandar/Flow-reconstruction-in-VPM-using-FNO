# Train particle model with true NeuralOperator GNOBlock stack.
# Run:
#   python -m final.train --task particle --config final/configs/train_particle_gno.yaml

seed: 42
device: cuda   # cuda | cpu | auto

dataset_npz: final/output/unified_vpm_geometry_v2/particle_dataset/particle_dataset.npz
split_idx_npz: final/output/unified_vpm_geometry_v2/particle_dataset/particle_split_indices.npz

output_dir: final/output/unified_vpm_geometry_v2/particle_dataset/training_particle_gno

epochs: 200
log_every: 10

hidden_dim: 128
n_layers: 4
radius: 0.2
transform_type: linear
reduction: mean
pos_embedding_type: transformer
pos_embedding_channels: 16

# Keep false unless your environment has open3d/torch-scatter configured.
use_open3d_neighbor_search: false
use_torch_scatter_reduce: false

max_nodes_per_frame: 4096

optimizer_cfg:
  optimizer: auto      # auto | adam | adamw
  lr: 0.001
  weight_decay: 0.0
  lr_step_size: 100
  lr_gamma: 0.5
