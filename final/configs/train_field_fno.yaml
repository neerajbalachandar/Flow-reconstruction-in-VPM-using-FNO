# Train FNO on one generated preset folder (copied to GPU PC or local).
# Run:
#   python -m final.train --task field --config final/configs/train_field_fno.yaml

seed: 42
device: cuda   # cuda | cpu | auto

# Set to one generated preset folder, e.g. preset_E
preset_root: final/output/unified_vpm_geometry_v2/preset_E
output_dir: final/output/unified_vpm_geometry_v2/preset_E/training_field

use_normalized: true
batch_size: 2
epochs: 500
loss: relative_l2
log_every: 10

optimizer_cfg:
  optimizer: auto      # auto | adam | adamw
  lr: 0.001
  weight_decay: 0.0
  lr_step_size: 100
  lr_gamma: 0.5

model:
  n_modes: [12, 12, 12]
  hidden_channels: 20
  n_layers: 4
  kernel_width: 256
